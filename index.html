<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Digital Safety — Live Audience Console</title>
<style>
  :root{
    --bg:#070d12; --ink:#0c151c; --panel:#101c24; --line:#1f3340; --line-soft:#162531;
    --text:#eef4f6; --muted:#8aa1ad; --faint:#5d7682;
    --beacon:#ffb02e; --safe:#3ddc97; --safe-d:#0f2c24; --scam:#ff6a5a; --scam-d:#33150f;
    --live:#3ddc97; --demo:#ffb02e;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
  ::selection{background:var(--beacon);color:#1a1100}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  .mono{font-family:var(--mono)}
  .hidden{display:none!important}

  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:12px clamp(14px,3vw,28px);background:rgba(7,13,18,.72);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
  .tb-btn{background:none;border:1px solid var(--line);color:var(--muted);width:38px;height:38px;border-radius:11px;font-size:16px;display:grid;place-items:center;transition:.15s}
  .tb-btn:hover{border-color:var(--beacon);color:var(--text)}
  .tb-btn[disabled]{opacity:.3;pointer-events:none}
  .tb-title{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .tb-sub{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.08em}
  .tb-spacer{flex:1}
  .tb-pill{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;
    padding:7px 12px;border-radius:999px;border:1px solid var(--line)}
  .tb-pill .dot{width:8px;height:8px;border-radius:50%}
  .tb-pill.live{color:var(--live);border-color:#1f4a3c;background:#10271f}
  .tb-pill.live .dot{background:var(--live);animation:blink 1.4s infinite}
  .tb-pill.demo{color:var(--demo);border-color:#4a3a18;background:#241a09}
  .tb-pill.demo .dot{background:var(--demo)}
  .tb-act{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:8px 13px;border-radius:11px;font-size:13px;font-weight:600;transition:.15s}
  .tb-act:hover{border-color:var(--beacon);color:var(--text)}

  .wrap{max-width:1100px;margin:0 auto;padding:clamp(16px,3vw,30px) clamp(14px,3vw,28px) 70px}

  /* ---------- home ---------- */
  .hero{padding:24px 0 8px}
  .hero .kick{font-family:var(--mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}
  .hero h1{font-size:clamp(32px,6vw,58px);line-height:1.02;margin:14px 0 0;font-weight:800;letter-spacing:-.025em}
  .hero h1 .g{color:var(--beacon)}
  .hero p{max-width:64ch;color:var(--muted);font-size:clamp(15px,1.6vw,18px);margin:16px 0 0}
  .howto{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
  .howto .pill{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line-soft);border-radius:13px;padding:11px 15px;font-size:13.5px;color:var(--muted)}
  .howto .pill b{color:var(--text)}
  .howto .pill .s{font-family:var(--mono);color:var(--beacon);font-weight:700}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;margin-top:28px}
  .card{position:relative;text-align:left;background:linear-gradient(160deg,var(--panel),#0a1218);
    border:1px solid var(--line-soft);border-radius:18px;padding:20px;color:var(--text);
    transition:transform .16s,border-color .16s,box-shadow .16s;display:flex;flex-direction:column;gap:9px;min-height:178px;overflow:hidden}
  .card::after{content:"";position:absolute;inset:0;background:radial-gradient(220px 120px at 90% -20%,#ffb02e18,transparent);opacity:0;transition:.2s}
  .card:hover{transform:translateY(-3px);border-color:var(--beacon);box-shadow:0 20px 50px -30px #000}
  .card:hover::after{opacity:1}
  .card:focus-visible{outline:2px solid var(--beacon);outline-offset:3px}
  .card .n{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--beacon);line-height:1}
  .card .play{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--safe);border:1px solid #1f4a3c;background:#10271f;padding:4px 9px;border-radius:999px}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start}
  .card h3{font-size:17px;font-weight:700;margin:0;line-height:1.2}
  .card p{font-size:13px;color:var(--muted);margin:0;flex:1}

  /* ---------- stage ---------- */
  .station-strip{display:flex;align-items:baseline;gap:12px;margin-top:6px}
  .station-strip .num{font-family:var(--mono);color:var(--beacon);font-size:13px;letter-spacing:.2em}
  .stage{position:relative;border-radius:24px;min-height:min(74vh,620px);
    background:radial-gradient(700px 460px at 50% 8%,#13242e,#080f14 70%);
    border:1px solid var(--line-soft);display:flex;align-items:flex-start;justify-content:center;
    padding:30px 18px;overflow:hidden;margin-top:14px}
  .stage::before{content:"";position:absolute;inset:0;background:radial-gradient(420px 280px at 50% 0%,#ffb02e10,transparent);pointer-events:none}
  .stage>*{position:relative;width:100%}

  /* ---------- presenter live layout ---------- */
  .pres{display:grid;grid-template-columns:1fr;gap:22px;width:100%;max-width:920px;margin:0 auto;align-items:start}
  @media(min-width:760px){.pres.two{grid-template-columns:330px 1fr}}
  .joinpanel{background:rgba(16,28,36,.7);border:1px solid var(--line-soft);border-radius:20px;padding:22px;text-align:center}
  .joinpanel .lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
  .qrbox{background:#fff;padding:14px;border-radius:16px;display:inline-block;line-height:0;min-height:40px}
  .qrnote{background:#0a141a;border:1px dashed var(--line);border-radius:16px;padding:28px 18px;color:var(--demo);font-size:13px;font-family:var(--mono);line-height:1.5}
  .joincode{font-family:var(--mono);font-weight:800;font-size:clamp(30px,7vw,46px);letter-spacing:.18em;color:var(--beacon);margin-top:16px;line-height:1}
  .joinurl{font-family:var(--mono);font-size:12px;color:var(--muted);word-break:break-all;margin-top:8px}
  .joinurl b{color:var(--text)}

  .livepanel{background:rgba(16,28,36,.55);border:1px solid var(--line-soft);border-radius:20px;padding:22px;min-height:260px;display:flex;flex-direction:column}
  .livehead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px}
  .livehead .ttl{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .counter{font-family:var(--mono);font-weight:800;font-size:clamp(40px,9vw,72px);line-height:1;letter-spacing:-.02em;color:var(--beacon)}
  .counter.safe{color:var(--safe)} .counter.scam{color:var(--scam)}
  .counterlab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:6px}

  .feed{margin-top:14px;display:flex;flex-direction:column;gap:7px;max-height:330px;overflow-y:auto}
  .feedrow{display:flex;align-items:center;gap:12px;background:#0a141a;border:1px solid var(--line-soft);border-radius:12px;padding:11px 14px;animation:slidein .35s cubic-bezier(.2,1,.3,1)}
  @keyframes slidein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .feedrow .av{flex:none;width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:15px;background:#14242e;color:var(--scam)}
  .feedrow .main{flex:1;min-width:0}
  .feedrow .main .a{font-family:var(--mono);font-size:15px;word-break:break-all}
  .feedrow .main .b{font-size:12px;color:var(--faint);margin-top:2px}
  .feedrow .main .b .reveal-val{font-family:var(--mono);color:var(--scam);background:#2a0f0b;border:1px solid #5a2b22;border-radius:6px;padding:1px 7px;font-size:13px;word-break:break-all}
  .feedrow .tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--scam);flex:none}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--faint);gap:10px;padding:24px}
  .empty .big{font-size:34px}
  .waitdots::after{content:"";animation:dots 1.4s steps(4,end) infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}

  /* vote bars */
  .votebars{display:flex;flex-direction:column;gap:16px;margin-top:18px}
  .vbar{}
  .vbar .vt{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;margin-bottom:7px}
  .vbar .track{height:34px;border-radius:10px;background:#0a141a;border:1px solid var(--line-soft);overflow:hidden}
  .vbar .fillb{height:100%;width:0;transition:width .4s cubic-bezier(.2,.9,.3,1);display:flex;align-items:center;padding-left:12px;font-family:var(--mono);font-weight:700;color:#06231a}
  .vbar.safe .fillb{background:var(--safe)} .vbar.scam .fillb{background:var(--scam);color:#2a0d08}
  .msgcard{background:#0a141a;border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:6px}
  .msgcard .from{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
  .msgcard .bub{background:#1b2c36;border-radius:16px;border-bottom-left-radius:5px;padding:14px 16px;font-size:15px}
  .flags{margin-top:12px}
  .flagline{font-size:13px;color:var(--muted);margin-top:6px}

  /* leaderboard */
  .board{display:flex;flex-direction:column;gap:8px;margin-top:14px;max-height:360px;overflow-y:auto}
  .brow{display:flex;align-items:center;gap:13px;background:#0a141a;border:1px solid var(--line-soft);border-radius:12px;padding:12px 14px;animation:slidein .35s}
  .brow .rk{font-family:var(--mono);font-size:13px;color:var(--faint);width:24px;flex:none;text-align:center}
  .brow .pw{font-family:var(--mono);font-size:16px;flex:1;min-width:0;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .yr{font-family:var(--mono);font-size:13px;flex:none;text-align:right}
  .brow.weak{border-color:var(--scam);background:var(--scam-d)} .brow.weak .yr{color:var(--scam)}
  .brow.strong{border-color:var(--safe)} .brow.strong .yr{color:var(--safe)}

  /* generic card + controls */
  .scard{width:100%;max-width:560px;background:rgba(16,28,36,.7);border:1px solid var(--line-soft);border-radius:20px;padding:26px;margin:0 auto}
  .scard .lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);text-align:center;margin-bottom:16px}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--beacon)}
  .btn.primary{background:var(--beacon);color:#1c1300;border-color:var(--beacon);font-weight:800}
  .btn.danger{background:var(--scam);color:#2a0d08;border-color:var(--scam);font-weight:800}
  .btn.ghost{background:none}
  .btn[disabled]{opacity:.4;pointer-events:none}
  .ctrlrow{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
  .verdict{font-family:var(--mono);font-weight:800;letter-spacing:.12em;font-size:18px;text-align:center;margin-top:16px}
  .verdict.g{color:var(--safe)} .verdict.r{color:var(--scam)}
  .subtext{color:var(--muted);font-size:13.5px;text-align:center;margin-top:12px;padding:0 6px}
  .field{width:100%;background:#0a141a;border:1px solid var(--line);border-radius:12px;color:var(--text);font-family:var(--mono);font-size:15px;padding:13px 14px}
  .field:focus{outline:2px solid var(--beacon);border-color:var(--beacon)}

  /* ---------- slide-over (notes + setup) ---------- */
  .scrim{position:fixed;inset:0;background:#000a;backdrop-filter:blur(3px);z-index:60;opacity:0;pointer-events:none;transition:.2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;top:0;right:0;bottom:0;width:min(440px,94vw);background:var(--ink);border-left:1px solid var(--line);z-index:61;
    transform:translateX(100%);transition:transform .26s cubic-bezier(.2,.9,.3,1);overflow-y:auto;padding:24px}
  .sheet.open{transform:none}
  .sheet .x{position:absolute;top:18px;right:18px;background:none;border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:9px;font-size:16px}
  .sheet h3{margin:0 40px 4px 0;font-size:18px}
  .sheet h4{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--beacon);margin:24px 0 10px}
  .sheet ol{margin:0;padding-left:18px} .sheet ol li{margin:7px 0;font-size:14px}
  .sheet ol li small{display:block;color:var(--muted);font-size:12.5px}
  .sheet p{font-size:13.5px;color:var(--muted);margin:8px 0}
  .sheet code{font-family:var(--mono);font-size:12px;background:#0a141a;border:1px solid var(--line-soft);padding:2px 6px;border-radius:6px;color:var(--text);word-break:break-all}
  .ncall{border-radius:12px;padding:14px;font-size:14px;margin-top:6px}
  .ncall.f{background:var(--safe-d);border:1px solid #1f4a3c}.ncall.f .l{color:var(--safe)}
  .ncall.s{background:var(--scam-d);border:1px solid #5a2b22}.ncall.s .l{color:var(--scam)}
  .ncall .l{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:5px}
  .setlabel{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 0 7px}
  .savebtn{width:100%;margin-top:18px;padding:14px;border-radius:13px;border:none;background:var(--beacon);color:#1c1300;font-weight:800;font-size:15px}
  .statusline{font-family:var(--mono);font-size:12px;padding:10px 12px;border-radius:10px;margin-top:14px;text-align:center}
  .statusline.ok{background:#10271f;color:var(--live);border:1px solid #1f4a3c}
  .statusline.no{background:#241a09;color:var(--demo);border:1px solid #4a3a18}

  /* ---------- participant (phone) view ---------- */
  .pv{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 0}
  .pv-head{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line-soft);font-size:13px;color:var(--muted)}
  .pv-head .lk{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,#2563a8,#1b3f6e);display:grid;place-items:center;font-size:12px;color:#fff}
  .pv-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px 22px 40px;max-width:480px;width:100%;margin:0 auto}
  .pv-body h2{font-size:26px;font-weight:800;margin:0 0 6px;line-height:1.15}
  .pv-body p.sub{color:var(--muted);font-size:15px;margin:0 0 22px}
  .pv-field{width:100%;background:#0a141a;border:1px solid var(--line);border-radius:14px;color:var(--text);font-family:var(--mono);font-size:18px;padding:16px;margin-top:8px}
  .pv-field:focus{outline:2px solid var(--beacon);border-color:var(--beacon)}
  .pv-flabel{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 0}
  .pv-btn{width:100%;padding:17px;border-radius:15px;border:none;font-weight:800;font-size:17px;margin-top:22px}
  .pv-btn.bait{background:#5a3df0;color:#fff}
  .pv-btn.go{background:var(--beacon);color:#1c1300}
  .pv-vote{display:flex;flex-direction:column;gap:14px;margin-top:10px}
  .pv-vote button{width:100%;padding:22px;border-radius:16px;border:2px solid var(--line);background:#0a141a;color:var(--text);font-size:19px;font-weight:800;transition:.12s}
  .pv-vote button.safe.on{border-color:var(--safe);background:var(--safe-d);color:var(--safe)}
  .pv-vote button.scam.on{border-color:var(--scam);background:var(--scam-d);color:var(--scam)}
  .pv-reveal{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 26px}
  .pv-reveal .ic{font-size:74px;animation:pop .45s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .pv-reveal h1{font-size:34px;font-weight:800;margin:10px 0 2px}
  .pv-reveal h1.r{color:var(--scam)} .pv-reveal h1.g{color:var(--safe)}
  .pv-reveal .big2{font-size:20px;font-weight:700;color:var(--text)}
  .pv-reveal p{color:var(--muted);font-size:15px;margin-top:18px;line-height:1.6;max-width:34ch}
  .pv-reveal p b{color:var(--text)}
  .pv-wait{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:40px 26px;color:var(--muted)}
  .pv-wait .chk{width:78px;height:78px;border-radius:50%;background:#103026;border:2px solid var(--safe);color:var(--safe);display:grid;place-items:center;font-size:38px;animation:pop .4s}
  .pv-wait h2{color:var(--text);font-size:23px;margin:0}
  .pv-meter{height:14px;border-radius:999px;background:#0a141a;border:1px solid var(--line-soft);overflow:hidden;margin:18px 0 8px}
  .pv-meter .f{height:100%;width:0;transition:width .3s,background .3s;border-radius:999px}
  .pv-crack{font-family:var(--mono);font-size:clamp(24px,8vw,40px);font-weight:800;text-align:center;line-height:1.1;margin-top:6px}
  .pv-cracklab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);text-align:center;margin-top:6px}
  .pv-note{font-size:12.5px;color:var(--faint);text-align:center;margin-top:16px}
  .pv-bait{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 26px;background:linear-gradient(180deg,#191235,#0d0a1c);min-height:0}
  .pv-bait .gift{font-size:60px}
  .pv-bait h1{font-size:28px;font-weight:800;margin:14px 0 4px}
  .pv-bait p{color:#b9b2d6;margin:0 0 4px}

  /* ---------- single-session show ---------- */
  .show{display:grid;grid-template-columns:1fr;gap:18px;margin-top:14px}
  @media(min-width:820px){.show{grid-template-columns:316px 1fr}}
  .showside{background:rgba(16,28,36,.72);border:1px solid var(--line-soft);border-radius:20px;padding:22px;text-align:center;align-self:start}
  @media(min-width:820px){.showside{position:sticky;top:84px}}
  .showside .lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
  .joined{margin-top:16px;border-top:1px solid var(--line-soft);padding-top:14px;font-family:var(--mono);font-size:13px;color:var(--safe)}
  .joined b{color:var(--text);font-size:16px}
  .showmain{min-height:min(62vh,540px);background:radial-gradient(700px 460px at 50% 8%,#13242e,#080f14 70%);border:1px solid var(--line-soft);border-radius:20px;padding:24px;display:flex;position:relative;overflow:hidden}
  .showmain::before{content:"";position:absolute;inset:0;background:radial-gradient(420px 280px at 50% 0%,#ffb02e10,transparent);pointer-events:none}
  .livepanel.solo{flex:1;background:none;border:none;padding:0;min-height:auto;position:relative;z-index:1}
  .lobbybox{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;position:relative;z-index:1}
  .lobbybox .big{font-size:50px}
  .lobbybox h2{font-size:clamp(22px,4vw,30px);margin:0;font-weight:800}
  .lobbybox .subtext{max-width:42ch}
  .showbar{position:sticky;bottom:12px;margin-top:18px;display:flex;align-items:center;gap:12px;justify-content:space-between;background:rgba(10,18,24,.86);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;padding:11px 14px;flex-wrap:wrap}
  .showbar .navbtns{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .dots{display:flex;gap:7px;flex:1;justify-content:center}

<script>
/* ============================================================
   Digital Safety — Live Audience Console
   All 5 demos are multi-device: presenter screen + real phones.
   Real-time transport: Firebase Realtime DB (REST + SSE) when a
   database URL is set; otherwise a local cross-tab fallback so the
   page is fully usable for preview/testing on one machine.
   ============================================================ */

/* ---------- config ----------
   Defaults come from config.js (window.DSC_CONFIG) so EVERY device — the
   presenter screen and all the phones — share the same database. The Setup
   panel can override on a single device (non-empty values win). */
const CFG = (()=>{
  const base = Object.assign({}, (window.DSC_CONFIG||{}));
  let saved={}; try{ saved=JSON.parse(localStorage.getItem('dsc_cfg')||'{}'); }catch(e){}
  for(const k in saved){ if(saved[k]) base[k]=saved[k]; }
  return base;
})();
function saveCfg(){ localStorage.setItem('dsc_cfg', JSON.stringify(CFG)); }
const esc=s=>(''+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ---------- realtime layer ---------- */
const LIVE = (()=>{
  const dbURL=()=> (CFG.dbURL||'').trim().replace(/\/+$/,'');
  const isLive=()=> !!dbURL();
  const listeners={};
  const bc = ('BroadcastChannel' in window) ? new BroadcastChannel('dsc_live') : null;
  const LKEY='dsc_tree';

  function setDeep(obj, parts, data){
    if(parts.length===0) return data;
    obj = (obj && typeof obj==='object') ? obj : {};
    const k=parts[0];
    if(parts.length===1){ if(data===null) delete obj[k]; else obj[k]=data; return obj; }
    obj[k]=setDeep(obj[k], parts.slice(1), data); return obj;
  }
  function getPath(tree, path){ let o=tree; for(const p of path.split('/').filter(Boolean)){ if(o==null)return null; o=o[p]; } return o===undefined?null:o; }

  /* firebase REST */
  function fbWrite(method, path, value){
    const opt={method,headers:{'Content-Type':'application/json'}};
    if(value!==undefined) opt.body=JSON.stringify(value);
    return fetch(dbURL()+'/'+path+'.json',opt).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json().catch(()=>null); });
  }
  function fbOn(path, cb){
    let cache=null;
    const es=new EventSource(dbURL()+'/'+path+'.json');
    const apply=(raw,patch)=>{ const m=JSON.parse(raw); const parts=m.path.split('/').filter(Boolean);
      if(patch && m.data && typeof m.data==='object'){ for(const key in m.data){ cache=setDeep(cache,parts.concat(key.split('/').filter(Boolean)),m.data[key]); } }
      else { cache=setDeep(cache,parts,m.data); }
      cb(cache); };
    es.addEventListener('put',e=>apply(e.data,false));
    es.addEventListener('patch',e=>apply(e.data,true));
    return ()=>{ try{es.close()}catch(e){} };
  }

  /* local fallback (cross-tab on one browser) */
  const lread=()=>{ try{return JSON.parse(localStorage.getItem(LKEY)||'{}')}catch(e){return{}} };
  const lwrite=t=>{ localStorage.setItem(LKEY,JSON.stringify(t)); if(bc)bc.postMessage(Date.now()); };
  function fireLocal(){ const t=lread(); for(const p in listeners) listeners[p].forEach(cb=>cb(getPath(t,p))); }
  if(bc) bc.onmessage=fireLocal;
  window.addEventListener('storage',e=>{ if(e.key===LKEY) fireLocal(); });
  function lwriteOp(method, path, value){
    const t=lread(), parts=path.split('/').filter(Boolean);
    if(method==='POST'){ const key='k'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); setDeep(t,parts.concat(key),value); lwrite(t); fireLocal(); return Promise.resolve({name:key}); }
    if(method==='DELETE'){ setDeep(t,parts,null); lwrite(t); fireLocal(); return Promise.resolve(null); }
    if(method==='PATCH'){ const cur=getPath(t,path)||{}; setDeep(t,parts,Object.assign({},cur,value)); lwrite(t); fireLocal(); return Promise.resolve(value); }
    setDeep(t,parts,value); lwrite(t); fireLocal(); return Promise.resolve(value);
  }

  return {
    isLive,
    set:(p,v)=> isLive()?fbWrite('PUT',p,v):lwriteOp('PUT',p,v),
    push:(p,v)=> isLive()?fbWrite('POST',p,v):lwriteOp('POST',p,v),
    patch:(p,v)=> isLive()?fbWrite('PATCH',p,v):lwriteOp('PATCH',p,v),
    remove:(p)=> isLive()?fbWrite('DELETE',p):lwriteOp('DELETE',p),
    on:(p,cb)=>{ if(isLive()) return fbOn(p,cb);
      (listeners[p]=listeners[p]||[]).push(cb); cb(getPath(lread(),p));
      return ()=>{ listeners[p]=(listeners[p]||[]).filter(x=>x!==cb); }; }
  };
})();

/* ---------- shared helpers ---------- */
function genCode(){ const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<4;i++)s+=A[Math.random()*A.length|0]; return s; }
function pid(){ let p=sessionStorage.getItem('dsc_pid'); if(!p){p='p'+Math.random().toString(36).slice(2,9);sessionStorage.setItem('dsc_pid',p);} return p; }
function baseURL(){ const b=(CFG.baseURL||'').trim().replace(/[#?].*$/,'').replace(/\s+/g,''); return b || (location.origin+location.pathname); }
function hostable(){ return /^https?:\/\//i.test(baseURL()); }
function joinURL(code){ return baseURL()+'#j='+code; }
function joinPanelHTML(code,label){
  return `<div class="lab">${label||'Audience \u2014 scan or open'}</div>
    <div id="qrslot"></div>
    <div class="joincode">${code}</div>
    <div class="joinurl" id="ju"></div>
    <div id="testslot"></div>`;
}
function wireJoin(root,code){
  const slot=root.querySelector('#qrslot'), ju=root.querySelector('#ju'), ts=root.querySelector('#testslot');
  if(hostable()){
    slot.innerHTML='<div class="qrbox" id="qr"></div>';
    qrInto(slot.querySelector('#qr'), joinURL(code));
    ju.innerHTML='open <b>'+esc(joinURL(code))+'</b>';
    ts.innerHTML='<button class="btn ghost" id="testphone" style="margin-top:16px;font-size:12px">Open a test phone \u2197</button>';
    ts.querySelector('#testphone').onclick=()=>window.open(joinURL(code),'_blank','noopener');
  }else{
    slot.innerHTML='<div class="qrnote">\u26a0\ufe0f No web address yet \u2014 nothing to scan</div>';
    ju.innerHTML='This is a preview with no real address, so the code can\u2019t be scanned. <b>Host the file</b> (GitHub Pages, Netlify Drop or Vercel) and open it from there \u2014 or paste your page\u2019s address under \u2699\ufe0f Setup \u2014 and a live QR appears here.';
  }
  if(!LIVE.isLive()) ju.innerHTML+='<div style="margin-top:10px;color:var(--demo)">Demo mode \u2014 add a database in \u2699\ufe0f Setup so real phones sync.</div>';
}
function count(o){ return o?Object.keys(o).length:0; }
function qrInto(box,url){ try{ const q=qrcode(0,'M'); q.addData(url); q.make(); box.innerHTML=q.createSvgTag({cellSize:5,margin:0}); }catch(e){ box.innerHTML='<div style="color:#999;font-size:12px;line-height:1.4;padding:10px">link too long to encode</div>'; } }
function maskNum(n){ const d=(''+n).replace(/[^\d+]/g,''); return d.length>5 ? d.slice(0,3)+'•••••'+d.slice(-2) : d; }
function maskPw(p){ if(!p) return ''; return p[0]+'•'.repeat(Math.min(Math.max(p.length-1,0),9))+(p.length>10?'…':''); }
function crack(pw){
  if(!pw) return {sec:0,label:'—'};
  let set=0; if(/[a-z]/.test(pw))set+=26; if(/[A-Z]/.test(pw))set+=26; if(/\d/.test(pw))set+=10; if(/[^a-zA-Z0-9]/.test(pw))set+=33; set=set||1;
  const sec=Math.pow(set,pw.length)/2/1e11;        // ~100 billion guesses/sec offline
  return {sec,label:humanTime(sec)};
}
function humanTime(sec){
  if(sec<1) return 'instant';
  const yr=sec/31557600;
  if(yr>=1e12) return 'longer than the universe';
  if(yr>=1e6)  return Math.round(yr/1e4).toLocaleString()+' million centuries';
  if(yr>=1000) return Math.round(yr/100).toLocaleString()+' centuries';
  if(yr>=1)    return (yr>=10?Math.round(yr):Math.round(yr*10)/10)+(yr>=2?' years':' year');
  const u=[['days',86400],['hours',3600],['minutes',60],['seconds',1]];
  for(const [n,s] of u){ if(sec>=s){ const v=sec/s; return (v>=10?Math.round(v):Math.round(v*10)/10)+' '+n; } }
  return 'instant';
}
async function sendHook(to,text){
  const url=(CFG.hook||'').trim(); if(!url) return false;
  // text/plain + no-cors keeps this a "simple" request, so it works from any
  // hosted page without the webhook needing CORS headers. Body is a JSON string.
  try{ await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify({to,text})}); return true; }
  catch(e){ return false; }
}

DSHOW.vote=(main,root,idx)=>{
  const base='s/'+show.code+'/d'+idx;
  const d=root['d'+idx]||{}, r=d.round||0, revealed=!!d.revealed, done=!!d.done, q=VOTE_ROUNDS[r];
  if(done){

    VOTE_ROUNDS.forEach((qq,ri)=>{ const vs=d.votes&&d.votes['r'+ri]?Object.values(d.votes['r'+ri]):[]; vs.forEach(v=>{ total++; if((v==='scam')===qq.scam) right++; }); });

/* ---- session navigation bar (phones follow `cur`) ---- */
function gotoCur(n){ clearAuto(); LIVE.set('s/'+show.code+'/cur',n); }

function renderShowBar(cur,root){
  const bar=document.getElementById('showbar'); if(!bar) return;
  const dots=['L'].concat(STATIONS.map((s,i)=>i)).map((x,i)=>{
    const di=i-1; let cls='d'; if(cur>=0&&di<cur)cls+=' done'; if((cur<0&&i===0)||di===cur)cls+=' on'; return `<span class="${cls}"></span>`;
  }).join('');
  let left='', right='', mid=`<div class="dots">${dots}</div>`;
  if(cur<0){
    left='<span style="font-family:var(--mono);font-size:12px;color:var(--muted)">Lobby</span>';
    right='<button class="btn primary" id="start">Start demos \u2192</button>';
  } else if(cur>=STATIONS.length){
    left='<span style="font-family:var(--mono);font-size:12px;color:var(--safe)">Complete</span>';
    right='<button class="btn ghost" id="prev">\u2190 Back</button><button class="btn primary" id="restart">\u21ba Run again</button>';
  } else {
    const last=cur===STATIONS.length-1;
    const auto=(autoIdx===cur)?`<span class="advlabel" id="advlabel">auto-advance in ${autoLeft}s</span>`:'';
    left=`<button class="btn ghost" id="prev">\u2190 Prev</button><button class="toggle ${autoAdvance?'on':''}" id="autotog">auto-advance ${autoAdvance?'on':'off'}</button>`;
    right=`${auto}<button class="btn ${autoIdx===cur?'primary':'primary'}" id="next">${last?'Finish \u2192':'Next demo \u2192'}</button>`;
  }
  bar.innerHTML=`<div class="navbtns">${left}</div>${mid}<div class="navbtns">${right}</div>`;
  const g=s=>bar.querySelector(s);
  if(g('#start')) g('#start').onclick=()=>gotoCur(0);
  if(g('#prev')) g('#prev').onclick=()=>gotoCur(cur<=0?-1:cur-1);
  if(g('#next')) g('#next').onclick=()=>gotoCur(cur+1);
  if(g('#restart')) g('#restart').onclick=()=>gotoCur(-1);
  if(g('#autotog')) g('#autotog').onclick=()=>{ autoAdvance=!autoAdvance; if(!autoAdvance)clearAuto(); renderShowBar(show.cur,root); };
}

/* ---- gentle auto-advance after a demo's reveal ---- */
const AUTO_SECS=12;
let autoAdvance=true, autoTimer=null, autoIdx=null, autoLeft=0;
function clearAuto(){ if(autoTimer){clearInterval(autoTimer);autoTimer=null;} autoIdx=null; autoLeft=0; }
function demoComplete(cur,root){
  if(cur<0||cur>=STATIONS.length-1) return false;   // never auto on the last demo
  const d=root['d'+cur]||{};
  if(cur===3) return !!d.done;                       // vote: after the score
  return !!d.revealed;                               // click/number/phish: after reveal
}
function updateAuto(cur,root){
  if(!autoAdvance){ clearAuto(); return; }
  if(demoComplete(cur,root)){
    if(autoIdx!==cur){ clearAuto(); autoIdx=cur; autoLeft=AUTO_SECS;
      autoTimer=setInterval(()=>{ autoLeft--; const l=document.getElementById('advlabel'); if(l)l.textContent='auto-advance in '+autoLeft+'s';
        if(autoLeft<=0){ const n=cur+1; clearAuto(); LIVE.set('s/'+show.code+'/cur',n); } },1000);
      renderShowBar(cur,root);
    }
  } else if(autoIdx!==null){ clearAuto(); renderShowBar(cur,root); }
}

    if(!joined){ joined=true; LIVE.set('s/'+code+'/joined/'+me,1); }
    const c=(data.cur==null?-1:data.cur);
    if(c<0){ if(sig!=='lobby'){sig='lobby'; root.innerHTML=lobbyPhone(code);} return; }
    if(c>=STATIONS.length){ if(sig!=='done'){sig='done'; root.innerHTML=thanksPhone();} return; }
    const station=STATIONS[c], d=data['d'+c]||{};
    const revealed=!!d.revealed, round=d.round||0, sub=submitted['d'+c]||null;
    const newSig=[c,revealed,round,JSON.stringify(sub)].join('|');
    if(newSig===sig) return;
    sig=newSig;
    PVIEW[station.id](root,{ code, data, d, demo:station.id, idx:c, revealed, round, me,
      submitted:sub,
      p:s=>'s/'+code+'/d'+c+'/'+s,
      setSubmitted:v=>{ submitted['d'+c]=v; sig=null; render(curData); } });
  }
  unsub=LIVE.on('s/'+code, d=>{ curData=d; render(d); });
}

function shellHead(){ return `<div class="pv-head"><span class="lk">\ud83d\udd12</span><span>Digital Safety \u00b7 live session</span></div>`; }
function shellWait(code,title,sub){
  return `<div class="pv">${shellHead()}<div class="pv-wait"><div class="spinner"></div><h2>${esc(title)}</h2><p style="max-width:30ch">${esc(sub)}</p><div class="pv-note">session ${esc(code)}</div></div></div>`;
}
function lobbyPhone(code){
  return `<div class="pv">${shellHead()}<div class="pv-wait"><div class="chk">\u2713</div><h2>You\u2019re in!</h2>
    <p>\ud83d\udc40 Keep this open and watch the big screen \u2014 it\u2019ll guide your phone through everything. No need to scan again.</p>
    <div class="pv-note">session ${esc(code)}</div></div></div>`;
}
function thanksPhone(){
  return `<div class="pv">${shellHead()}<div class="pv-reveal" style="background:linear-gradient(180deg,#0f2c24,#08130f)">
    <div class="ic">\u2705</div><h1 class="g">Thank you!</h1><div class="big2">That\u2019s the end of the session.</div>
    <p>Five quick lessons in how easily a scam works. <b>Stop \u00b7 Think \u00b7 Verify</b> \u2014 and never act on a link, prize, or OTP you didn\u2019t ask for.</p></div></div>`;
}

const PVIEW={};

/* 01 click */
PVIEW.click=(root,ctx)=>{
  if(ctx.revealed){ root.innerHTML=beware(); return; }
  if(ctx.submitted&&ctx.submitted.done){
    root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-wait"><div class="chk">\u2713</div><h2>You\u2019re in!</h2><p>Hang on \u2014 look up at the big screen.</p></div></div>`; return;
  }
  root.innerHTML=`<div class="pv"><div class="pv-bait"><div class="gift">\ud83c\udf81</div><h1>You\u2019ve won a reward!</h1><p>A \u20b91,000 voucher is waiting for you.</p><p style="font-size:13px">Tap below to verify and claim instantly.</p>
    <button class="pv-btn bait" id="claim">Verify &amp; claim now</button></div></div>`;
  root.querySelector('#claim').onclick=()=>{ LIVE.set(ctx.p('click/'+ctx.me),{t:Date.now()}); ctx.setSubmitted({done:true}); };
};

/* 02 number */
PVIEW.number=(root,ctx)=>{
  if(ctx.revealed){ root.innerHTML=beware('\u26a0\ufe0f','Gotcha.','That number is gone.','You just gave your phone number to a stranger because a screen promised a prize. <b>That\u2019s all a scammer needs to start.</b> Never hand your number to claim something you didn\u2019t enter.'); return; }
  if(ctx.submitted&&ctx.submitted.done){
    const texted=!!(CFG.hook||'').trim();
    root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-wait"><div class="chk">\u2713</div><h2>Registered!</h2><p>${texted?'\ud83d\udc40 Check your text messages\u2026':'Your entry is in. Watch the big screen.'}</p></div></div>`; return;
  }
  root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-body">
    <h2>\ud83c\udf89 Claim your \u20b92,000 voucher</h2><p class="sub">Limited offer \u2014 just register your mobile number and we\u2019ll text you the voucher right away.</p>
    <div class="pv-flabel">Mobile number</div>
    <input class="pv-field" id="num" inputmode="tel" placeholder="9876543210" autocomplete="off">
    <button class="pv-btn go" id="go">Claim my voucher</button>
    <div class="pv-note">By tapping you\u2019ll see why this was a test \u2014 nothing is charged.</div>
  </div></div>`;
  const inp=root.querySelector('#num');
  root.querySelector('#go').onclick=()=>{
    const v=inp.value.trim(); if(v.replace(/\D/g,'').length<6){ inp.style.borderColor='var(--scam)'; inp.focus(); return; }
    LIVE.set(ctx.p('numbers/'+ctx.me),{n:v,t:Date.now()});
    sendHook(v, SMS_MSG);
    ctx.setSubmitted({done:true});
  };
};

/* 03 phish */
PVIEW.phish=(root,ctx)=>{
  if(ctx.revealed){ root.innerHTML=beware('\u26a0\ufe0f','Phished.','Everything you typed is on the screen.','You typed your details into a page that only looked real \u2014 and a stranger captured them live. <b>A page that imitates your bank is not your bank.</b> Check the address, and never log in from a link.'); return; }
  if(ctx.submitted&&ctx.submitted.done){
    root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-wait"><div class="chk">\u2713</div><h2>Signing you in\u2026</h2><p>Please wait. (Look at the big screen.)</p></div></div>`; return;
  }
  root.innerHTML=`<div class="pv" style="background:#0b1320">${shellHead()}<div class="pv-body">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px"><div style="width:34px;height:34px;border-radius:9px;background:#1b66c9;display:grid;place-items:center;color:#fff;font-weight:800">S</div><b style="font-size:18px">SecureBank</b></div>
    <h2 style="font-size:22px">Verify your account</h2><p class="sub">Unusual activity detected. Sign in to confirm it\u2019s really you.</p>
    <div style="background:#241a09;border:1px solid #4a3a18;color:var(--demo);font-size:12.5px;border-radius:10px;padding:10px 12px;margin-bottom:8px">For this demo, type a <b>fake</b> name and a <b>fake</b> password.</div>
    <div class="pv-flabel">Username</div><input class="pv-field" id="u" autocomplete="off" placeholder="e.g. demo_user">
    <div class="pv-flabel">Password</div><input class="pv-field" id="p" type="password" autocomplete="off" placeholder="anything fake">
    <button class="pv-btn go" id="go">Sign in</button>
  </div></div>`;
  root.querySelector('#go').onclick=()=>{
    const u=root.querySelector('#u').value.trim(), p=root.querySelector('#p').value;
    LIVE.set(ctx.p('creds/'+ctx.me),{u:u.slice(0,60),pw:p.slice(0,64),plen:p.length,t:Date.now()});
    ctx.setSubmitted({done:true});
  };
};

/* 04 vote */
PVIEW.vote=(root,ctx)=>{
  const r=ctx.round, q=VOTE_ROUNDS[r];
  if(ctx.d&&ctx.d.done){ root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-wait"><div class="chk">\u2713</div><h2>That\u2019s a wrap!</h2><p>Look at the big screen for the room\u2019s score.</p></div></div>`; return; }
  if(!q){ root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-wait"><div class="chk">\u2713</div><h2>That\u2019s a wrap!</h2><p>Look at the big screen.</p></div></div>`; return; }
  const myVote=ctx.submitted&&ctx.submitted['r'+r];
  if(ctx.revealed){
    const right=(myVote==='scam')===q.scam;
    root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-reveal"><div class="ic">${q.scam?'\u26a0\ufe0f':'\u2705'}</div>
      <h1 class="${q.scam?'r':'g'}">${q.scam?'Scam':'Safe'}</h1>
      ${myVote?`<div class="big2" style="color:${right?'var(--safe)':'var(--scam)'}">You voted ${myVote==='scam'?'Scam':'Safe'} \u2014 ${right?'correct \u2713':'look again'}</div>`:'<div class="big2">No vote recorded</div>'}
      <p>${esc(q.flags[0])}</p><div class="pv-note">Next up on the screen\u2026</div></div></div>`; return;
  }
  root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-body">
    <div class="pv-flabel">Round ${r+1} of ${VOTE_ROUNDS.length} \u00b7 from ${esc(q.from)}</div>
    <div class="msgcard" style="margin-top:10px"><div class="bub">${esc(q.text)}</div></div>
    <p class="sub" style="margin-top:18px">Is this safe, or a scam?</p>
    <div class="pv-vote">
      <button class="safe ${myVote==='safe'?'on':''}" data-v="safe">\u2713 Safe</button>
      <button class="scam ${myVote==='scam'?'on':''}" data-v="scam">\u2717 Scam</button>
    </div></div></div>`;
  root.querySelectorAll('.pv-vote button').forEach(b=>b.onclick=()=>{
    LIVE.set(ctx.p('votes/r'+r+'/'+ctx.me), b.dataset.v);
    const s=Object.assign({},ctx.submitted); s['r'+r]=b.dataset.v; ctx.setSubmitted(s);
  });
};

/* 05 crack */
PVIEW.crack=(root,ctx)=>{
  root.innerHTML=`<div class="pv">${shellHead()}<div class="pv-body">
    <h2>How strong is it?</h2><p class="sub">Type a <b>sample</b> password (never a real one) and watch how long it survives an attack.</p>
    <input class="pv-field" id="pw" autocomplete="off" placeholder="type here\u2026">
    <div class="pv-meter"><div class="f" id="mf"></div></div>
    <div class="pv-crack" id="ct">\u2014</div><div class="pv-cracklab">time to crack</div>
    <button class="pv-btn go" id="go">Put it on the board</button>
    <div class="pv-note" id="note">What you type appears on the big screen \u2014 use a <b>sample</b>, never a real password.</div>
  </div></div>`;
  const inp=root.querySelector('#pw'), mf=root.querySelector('#mf'), ct=root.querySelector('#ct');
  const upd=()=>{ const v=inp.value, c=crack(v); ct.textContent=v?c.label:'\u2014';
    const score=v?Math.min(Math.log10(c.sec+1)/12,1):0; mf.style.width=(score*100)+'%';
    mf.style.background=score<.25?'var(--scam)':score<.6?'var(--beacon)':'var(--safe)'; };
  inp.oninput=upd; upd();
  root.querySelector('#go').onclick=()=>{
    const v=inp.value; if(!v){ inp.focus(); return; }
    const c=crack(v);
    LIVE.set(ctx.p('pwd/'+ctx.me),{pw:v.slice(0,64),m:maskPw(v),label:c.label,sec:c.sec,t:Date.now()});
    root.querySelector('#note').innerHTML='<b style="color:var(--safe)">On the board!</b> Try a longer passphrase and add it again to watch it climb.';
  };
};

/* shared "beware" reveal for phones */
function beware(ic,title,big,body){
  ic=ic||'\u26a0\ufe0f'; title=title||'Beware!'; big=big||'It\u2019s a scam.';
  body=body||'You just opened a stranger\u2019s link \u2014 in a room about scams. A real one could have stolen your login or your money. <b>Stop \u00b7 Think \u00b7 Verify.</b>';
  return `<div class="pv"><div class="pv-reveal" style="background:linear-gradient(180deg,#2a0d08,#160606)">
    <div class="ic">${ic}</div><h1 class="r">${esc(title)}</h1><div class="big2">${esc(big)}</div><p>${body}</p></div></div>`;
}

/* ============================================================
   SLIDE-OVERS: notes + setup
   ============================================================ */
const scrim=document.getElementById('scrim'), notesEl=document.getElementById('notes'), setupEl=document.getElementById('setup');
scrim.onclick=closeSheets;
function openNotes(){ scrim.classList.add('open'); notesEl.classList.add('open'); }
function openSetup(){ buildSetupSheet(); scrim.classList.add('open'); setupEl.classList.add('open'); }
function closeSheets(){ scrim.classList.remove('open'); notesEl.classList.remove('open'); setupEl.classList.remove('open'); }
window.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if(notesEl.classList.contains('open')||setupEl.classList.contains('open'))closeSheets(); else if(sess)goHome(); } });

function buildNotesSheet(s){
  notesEl.innerHTML=`<button class="x" id="cn">\u2715</button>
    <h3>${esc(s.title)}</h3>
    <h4>How to run it</h4><ol>${s.steps.map(st=>`<li>${esc(st.t)}</li>`).join('')}</ol>
    <h4>Freeze &amp; explain</h4><div class="ncall f"><span class="l">say this</span>${esc(s.freeze)}</div>
    <h4>Safety</h4><div class="ncall s"><span class="l">good to know</span>${esc(s.safety)}</div>`;
  notesEl.querySelector('#cn').onclick=closeSheets;
}

function buildSetupSheet(){
  const live=LIVE.isLive(), host=hostable();
  setupEl.innerHTML=`<button class="x" id="cs">\u2715</button>
    <h3>Setup</h3>
    <p>The demos work right now in <b>demo mode</b> (test on this device using the \u201cOpen a test phone\u201d button). To run with a real audience\u2019s phones, set the two things below \u2014 one time, on the presenting computer.</p>
    <div class="statusline ${live?'ok':'no'}">${live?'\u25cf Connected \u2014 real phones can join':'\u25cb Demo mode \u2014 add a database URL to go live'}</div>
    ${host?'':'<div class="statusline no" style="margin-top:8px">\u25cb No web address \u2014 the join QR can\u2019t be scanned until this page is hosted (or you set its address below)</div>'}

    <h4>1 \u00b7 Public page address</h4>
    <p>The QR code points phones at wherever this page lives. Once you <b>host the file</b> (GitHub Pages, Netlify Drop or Vercel \u2014 about 60 seconds) and open it from that address, this fills in by itself. While previewing, paste the hosted address here so the QR works.</p>
    <div class="setlabel">Hosted page URL</div>
    <input class="field" id="baseURL" placeholder="https://your-site.netlify.app/index.html" value="${esc(CFG.baseURL||'')}">

    <h4>2 \u00b7 Real-time database</h4>
    <p>Create a free <b>Firebase</b> project \u2192 build a <b>Realtime Database</b> \u2192 paste its URL here. In test mode its rules allow public read/write, which is all this needs for a session.</p>
    <div class="setlabel">Realtime Database URL</div>
    <input class="field" id="dbURL" placeholder="https://your-project-default-rtdb.firebaseio.com" value="${esc(CFG.dbURL||'')}">

    <h4>3 \u00b7 WhatsApp / SMS (optional)</h4>
    <p>\u201cJust Your Number\u201d can send a real message to each phone on reveal. Point this at a webhook from <b>Twilio</b>, <b>Meta WhatsApp Cloud API</b>, or a no-code tool (Make / Zapier) that accepts <code>{ "to": "\u2026", "text": "\u2026" }</code> and sends the message. Leave blank for an on-screen-only reveal.</p>
    <div class="setlabel">Messaging webhook URL</div>
    <input class="field" id="hook" placeholder="https://hook.make.com/\u2026" value="${esc(CFG.hook||'')}">

    <button class="savebtn" id="save">Save on this device</button>
    <p style="margin-top:16px;font-size:12.5px">This panel saves only on <b>this</b> computer. For a hosted event, set these once in <code>config.js</code> instead \u2014 that\u2019s what lets the audience\u2019s phones connect to the same session. See the README.</p>`;
  setupEl.querySelector('#cs').onclick=closeSheets;
  setupEl.querySelector('#save').onclick=()=>{
    CFG.baseURL=setupEl.querySelector('#baseURL').value.trim();
    CFG.dbURL=setupEl.querySelector('#dbURL').value.trim();
    CFG.hook=setupEl.querySelector('#hook').value.trim();
    saveCfg(); closeSheets();
    if(sess) openStation(sess.demo); else goHome();
  };
}

route();
